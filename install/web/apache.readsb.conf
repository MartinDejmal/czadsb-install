# Predpis pro api z ReADSB pro Apache
#
# Potrebne modduly:
#
# sudo a2enmod alias cgi proxy proxy_http rewrite headers authz_host
# sudo systemctl restart apache2
#
# apache2ctl -M                # Vypise seznam nactenych modulu
# sudo apache2ctl configtest   # Ověří, zda v syntaxi není chyba
#
<VirtualHost *:80>
    ServerName api.czadsb.cz
    DocumentRoot /var/www/html

    RewriteEngine On

    # --- 1. VÝJIMKY Z PROXY ---
    # Nejdříve řekneme proxy, co má ignorovat (lokální soubory a skripty)
    ProxyPass /api/system.json !
    ProxyPassMatch ^/api/(clients|receivers|status|receiver|stats)\.json$ !

    # --- 2. MAPOVÁNÍ CEST (Alias) ---
    # Namapujeme virtuální URL na fyzické soubory na disku
    Alias "/api/system.json" "/var/www/html/system.cgi"
    AliasMatch "^/api/(clients|receivers|status|receiver|stats)\.json$" "/run/readsb/$1.json"

    # --- 3. LOGIKA A OCHRANA UVNITŘ /api/ ---
    <Location "/api/">
        # Omezení přístupu na IP adresy
        <RequireAny>
            Require ip 127.0.0.1
            Require ip ::1
            Require ip 10.0.0.0/8
            Require ip 192.168.0.0/16
            Require ip 176.74.154.2/32
        </RequireAny>

        # --- BEZPEČNOSTNÍ FILTR PRO JSON ---
        # Zablokujeme (403) vše, co končí na .json, 
        # ALE NENÍ to system.json ani soubor z našeho whitelistu.
        RewriteCond %{REQUEST_URI} \.json$
        RewriteCond %{REQUEST_URI} !^/api/(system|clients|receivers|status|receiver|stats)\.json$
        RewriteRule .* - [F]

        # --- REWRITE PRO PARAMETRY (api/all -> api/?all) ---
        # Provede se pouze pro požadavky, které nemají v názvu tečku (nejsou to soubory)
        RewriteCond %{REQUEST_URI} ^/api/([^/.]+)$
        RewriteRule ^([^/.]+)$ http://127.0.0.1:8008/api/?$1 [P,L]
    </Location>

    # --- 4. PROXY PRO ZBYTEK /api/ ---
    ProxyPass /api/ http://127.0.0.1:8008/api/
    ProxyPassReverse /api/ http://127.0.0.1:8008/api/

    # --- 5. OPRÁVNĚNÍ ADRESÁŘŮ ---
    
    <Directory "/var/www/html">
        Options +ExecCGI
        AddHandler cgi-script .cgi
        Require all granted
    </Directory>

    <Directory "/run/readsb">
        # Klíčové pro přístup k RAM disku
        Options +FollowSymLinks
        AllowOverride None
        Require all granted
        AddType application/json .json
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/api-error.log
    CustomLog ${APACHE_LOG_DIR}/api-access.log combined
</VirtualHost>
