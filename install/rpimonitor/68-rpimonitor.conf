# --- Načtení potřebných modulů ---
server.modules += (
    "mod_proxy",
    "mod_redirect"  # Přidán modul pro přesměrování
)

# --- Konfigurace pro RPiMonitor ---
$HTTP["url"] =~ "^/rpimonitor" {
    
    # 1. Pokud uživatel zadá přesně /rpimonitor (bez lomítka), 
    # přesměruj ho na /rpimonitor/ (s lomítkem)
    url.redirect = (
        "^/rpimonitor$" => "/rpimonitor/"
    )

    # 2. Samotná proxy
    proxy.server = (
        "/rpimonitor" => (
            (
                "host" => "127.0.0.1",
                "port" => 8888
            )
        )
    )
}
