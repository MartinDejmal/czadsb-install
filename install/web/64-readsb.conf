# --- Načtení potřebných modulů ---
server.modules += (
    "mod_access",
    "mod_alias",
    "mod_proxy",
    "mod_rewrite",
    "mod_cgi"
)

# Definice, jak se spouští .cgi soubory
cgi.assign += ( ".cgi" => "/bin/bash" )

# --- Logika pro /api/ ---
$HTTP["url"] =~ "^/api/" {

    # 1. SPECIÁLNÍ PŘÍPAD: system.json (volá náš skript)
    $HTTP["url"] == "/api/system.json" {
        alias.url = ( "/api/system.json" => "/var/www/html/system.cgi" )
    }

    # 2. OSTATNÍ JSON SOUBORY (berou se z RAM disku readsb)
    else $HTTP["url"] =~ "\.json$" {

        # Whitelist povolených souborů (přidali jsme 'system' pro jistotu)
        $HTTP["url"] !~ "^/api/(clients|receivers|status|receiver|stats|system)\.json$" {
            url.access-deny = ( "" )
        }

        # Namapování na lokální adresář readsb
        alias.url = ( "/api/" => "/run/readsb/" )
    }

    # 3. VŠE OSTATNÍ (přesměrování na proxy/socket)
    else {
        url.rewrite-once = ( "^/api/\??([^/.]+)$" => "/api/?$1" )

        proxy.server = (
            "/api/" => (
                (
#                    "host" => "127.0.0.1",
#                    "port" => 8008
                    "socket" => "/run/readsb/api.sock"
                )
            )
        )
    }
}
