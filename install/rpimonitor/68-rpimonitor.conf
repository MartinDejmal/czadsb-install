# --- Nacteni potrebnych modulu ---
server.modules += (
    "mod_proxy",
    "mod_redirect"  # Pridan modul pro presmerovani
)

# --- Konfigurace pro RPiMonitor ---
$HTTP["url"] =~ "^/rpimonitor" {
    
    # 1. Pokud uzivatel zada presne /rpimonitor (bez lomitka), 
    # presmeruj ho na /rpimonitor/ (s lomitkem)
    url.redirect = (
        "^/rpimonitor$" => "/rpimonitor/"
    )

    # 2. Samotna proxy
    proxy.server = (
        "/rpimonitor" => (
            (
                "host" => "127.0.0.1",
                "port" => 8888
            )
        )
    )
}
